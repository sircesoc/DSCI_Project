dataset:
  repo_id: repo_foldflow
  root: /media/sircesoc/WD_BLACK/lehome/dataset_challenge_merged/top_long_merged

policy:
  type: foldflow
  device: cuda
  push_to_hub: false

  input_features:
    observation.state:
      type: STATE
      shape: [12]
    observation.images.top_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.left_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_rgb:
      type: VISUAL
      shape: [3, 480, 640]

  output_features:
    action:
      type: ACTION
      shape: [12]

  n_obs_steps: 2
  horizon: 32
  n_action_steps: 16
  drop_n_last_frames: 15

  # Vision
  vision_backbone: resnet18
  pretrained_backbone_weights: IMAGENET1K_V1
  crop_shape: [224, 224]
  crop_is_random: true
  vision_feature_dim: 512
  num_views_fusion_heads: 4

  # DiT
  dit_hidden_dim: 512
  dit_n_heads: 8
  dit_n_layers: 6
  dit_ffn_dim: 2048
  dit_dropout: 0.1

  # Flow matching
  num_flow_steps: 10
  sigma_min: 0.0001

  # Optimizer
  optimizer_lr: 0.0001
  optimizer_betas: [0.95, 0.999]
  optimizer_weight_decay: 0.00001
  scheduler_warmup_steps: 500

output_dir: outputs/train/foldflow
batch_size: 16
steps: 50000
save_freq: 5000
log_freq: 500

wandb:
  enable: false
